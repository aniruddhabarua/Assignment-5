<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="font-geist">
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <img src="assets/github-logo.png" alt="">
            </div>
            <h2>GitHub Issues Tracker</h2>
            <p class="login-subtitle">Sign In To Manage Your Issues</p>
            <form>
                <label>Username</label>
                <input type="text" placeholder="Enter Username">
                <small class="default">Default: admin</small>
                <label>Password</label>
                <input type="text" placeholder="Enter Password">
                <small class="default">Default: admin123</small>
            </form>
            <button class="login-button" onclick="signIn()">Sign In</button>
            <div class="login-divider">
                <p>OR</p>
            </div>

            <div class="login-demo">
                <p>Demo Credentials:</p>
                <p><b>Username:</b> admin</p>
                <p><b>Password:</b> admin123</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>    
</body>
</html>
