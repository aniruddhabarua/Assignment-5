<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="home.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="font-geist">
  <nav class="navbar">
    <div class="nav-left">
      <img src="assets/github-logo.png" alt="">
      <h2 class="nav-title">GitHub Issues Tracker</h2>
    </div>
    <div class="nav-right">
      <div class="search-wrapper">
        <i class="fa-solid fa-magnifying-glass"></i><input type="text" id="searchInput" class="search-input" placeholder="Search issues..." />
      </div>
      <button class="nav-button" id="newIssueBtn">+ New Issue</button>
    </div>
  </nav>
  <main class="main-container">
    <div class="tab-container">
      <button class="tab-btn active" data-filter="all">All</button>
      <button class="tab-btn" data-filter="open">Open</button>
      <button class="tab-btn" data-filter="closed">Closed</button>
    </div>
    <div class="issues-container">
      <div class="issues-left">
        <div class="issues-icon">
            <img src="assets/Aperture.png" alt="">
        </div>
        <div>
          <div class="issues-count"><span id="issueCount">0</span> Issues</div>
          <div class="issues-subtitle">Track and manage your project issues</div>
        </div>
      </div>
      <div class="issues-right">
        <span class="issues-status open-dot"></span><span>Open</span>
        <span class="issues-status closed-dot"></span><span>Closed</span>
      </div>
    </div>
    <div id="allIssues">

    </div>
  </main>
    <script src="home.js"></script>    
</body>
</html>
